<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérification anti-fraude</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; line-height: 1.45; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    input, button, textarea { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; font-weight: 600; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .muted { color: #666; font-size: 0.92rem; }
    .ok { color: #0a7a0a; }
    .err { color: #b00020; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f7f7f7; padding: 10px; border-radius: 8px; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Vérification client (anti-fraude)</h1>
  <p class="muted">
    En continuant, vous acceptez le partage de votre position et de certaines informations techniques
    (IP, navigateur, heure) pour vérification anti-fraude.
  </p>

  <div class="card">
    <div class="row">
      <div>
        <label>Nom</label>
        <input id="name" type="text" placeholder="Jean Dupont" />
      </div>
      <div>
        <label>Email</label>
        <input id="email" type="email" placeholder="jean@email.com" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Téléphone</label>
        <input id="phone" type="tel" placeholder="+33..." />
      </div>
      <div>
        <label>Pays déclaré</label>
        <input id="country" type="text" placeholder="France" />
      </div>
    </div>

    <label>Motif / message</label>
    <textarea id="note" rows="3" placeholder="Expliquez votre demande..."></textarea>

    <label style="display:flex; gap:10px; align-items:flex-start; margin-top:12px;">
      <input id="consent" type="checkbox" style="width:auto; margin-top:3px;" />
      <span>J’autorise la collecte de ma position et des informations techniques pour prévention de fraude.</span>
    </label>

    <button id="btn" style="margin-top:12px;">Partager ma position et envoyer</button>

    <p id="status" class="muted" style="margin-top:12px;"></p>
    <pre id="debug" hidden></pre>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function status(msg, cls = "muted") {
      const el = $("status");
      el.textContent = msg;
      el.className = cls;
    }

    function getClientInfo() {
      return {
        userAgent: navigator.userAgent || "",
        language: navigator.language || "",
        languages: navigator.languages || [],
        platform: navigator.platform || "",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        screen: {
          width: window.screen?.width ?? null,
          height: window.screen?.height ?? null,
          pixelRatio: window.devicePixelRatio || 1
        },
        viewport: {
          width: window.innerWidth,
          height: window.innerHeight
        }
      };
    }

    async function sendPayload(payload) {
      const res = await fetch("/.netlify/functions/notify-location", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      let data;
      try {
        data = await res.json();
      } catch {
        data = { ok: false, error: "Réponse invalide du serveur" };
      }

      if (!res.ok || !data.ok) {
        throw new Error(data.telegram?.description || data.error || `HTTP ${res.status}`);
      }
      return data;
    }

    function requestLocationWithFallback(onSuccess, onError) {
      // 1er essai : haute précision (GPS) — plus lent / peut échouer en intérieur
      navigator.geolocation.getCurrentPosition(
        onSuccess,
        (err1) => {
          // 2e essai : mode plus souple (souvent plus compatible)
          navigator.geolocation.getCurrentPosition(
            onSuccess,
            (err2) => onError(err2 || err1),
            {
              enableHighAccuracy: false,
              timeout: 20000,
              maximumAge: 60000
            }
          );
        },
        {
          enableHighAccuracy: true,
          timeout: 20000,
          maximumAge: 0
        }
      );
    }

    $("btn").addEventListener("click", async () => {
      try {
        if (!$("consent").checked) {
          status("Tu dois cocher le consentement avant de continuer.", "err");
          return;
        }

        if (!("geolocation" in navigator)) {
          status("La géolocalisation n'est pas supportée sur cet appareil/navigateur.", "err");
          return;
        }

        status("Demande de permission de localisation…");

        requestLocationWithFallback(
          async (pos) => {
            try {
              status("Position obtenue, envoi en cours…");

              const payload = {
                lead: {
                  name: $("name").value.trim(),
                  email: $("email").value.trim(),
                  phone: $("phone").value.trim(),
                  country: $("country").value.trim(),
                  note: $("note").value.trim()
                },
                consent: {
                  accepted: true,
                  textVersion: "v1",
                  acceptedAt: new Date().toISOString()
                },
                geo: {
                  latitude: pos.coords.latitude,
                  longitude: pos.coords.longitude,
                  accuracy_m: pos.coords.accuracy,
                  altitude: pos.coords.altitude ?? null,
                  altitudeAccuracy: pos.coords.altitudeAccuracy ?? null,
                  heading: pos.coords.heading ?? null,
                  speed: pos.coords.speed ?? null,
                  timestamp: pos.timestamp
                },
                client: getClientInfo()
              };

              $("debug").hidden = false;
              $("debug").textContent = JSON.stringify(payload, null, 2);

              const result = await sendPayload(payload);
              status("✅ Vérification envoyée. Merci.", "ok");

              if (result.mapsUrl) {
                const oldLink = document.getElementById("maps-link");
                if (oldLink) oldLink.remove();

                const a = document.createElement("a");
                a.id = "maps-link";
                a.href = result.mapsUrl;
                a.target = "_blank";
                a.rel = "noopener";
                a.textContent = "Ouvrir la position dans Google Maps";
                a.style.display = "inline-block";
                a.style.marginTop = "8px";
                document.querySelector(".card").appendChild(a);
              }
            } catch (e) {
              status("Erreur d'envoi : " + (e.message || e), "err");
            }
          },
          (err) => {
            let msg = `Localisation refusée / impossible (${err.code}) : ${err.message}`;

            if (err.code === 1) {
              msg = "Localisation refusée (permission non accordée).";
            } else if (err.code === 2) {
              msg = "Position indisponible. Active la localisation du téléphone, Wi-Fi + données mobiles, puis réessaie (de préférence près d'une fenêtre / en extérieur).";
            } else if (err.code === 3) {
              msg = "La localisation a expiré (timeout). Réessaie.";
            }

            status(msg, "err");
          }
        );
      } catch (e) {
        status("Erreur : " + (e.message || e), "err");
      }
    });
  </script>
</body>
</html>
